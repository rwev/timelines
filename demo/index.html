<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timelines - Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        padding: 1.5rem;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      h1 {
        margin-bottom: 0.25rem;
        color: #333;
        font-size: 1.3rem;
      }
      .subtitle {
        color: #666;
        margin-bottom: 0.75rem;
        font-size: 0.85rem;
      }
      .controls {
        margin-bottom: 0.75rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .controls button {
        padding: 0.35rem 0.7rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: white;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .controls button:hover {
        background: #eee;
      }
      #timeline-container {
        flex: 1;
        min-height: 0;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <h1>Timelines</h1>
    <p class="subtitle">Click filled markers to drill down. Scroll to zoom. Drag to pan.</p>
    <div class="controls">
      <button id="btn-collapse">Collapse All</button>
      <button id="btn-fit">Fit to Content</button>
    </div>
    <div id="timeline-container"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
